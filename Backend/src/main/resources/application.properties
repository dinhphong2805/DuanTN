# SQL Server — mật khẩu phải trùng với tài khoản sa trên máy bạn (đổi dưới đây nếu khác)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=KesnStore;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
# Giữ đúng tên cột trong @Column (VD: Vouchers.StartAt/EndAt), không ép snake_case
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Server
server.port=8080
spring.application.name=kesn-backend

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
